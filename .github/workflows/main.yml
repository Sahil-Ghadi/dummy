name: Next.js CI/CD

on: 
  push:
    branches:
      - main

jobs:
  # STAGE 1: Test the Code
  test:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout Repository
        uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '20'

      - name: Install Dependencies
        run: npm ci

      - name: Verify Next.js Build
        run: npm run build

      - name: Install Playwright Browsers
        run: npx playwright install --with-deps

      - name: Run Playwright tests
        run: npx playwright test
        
      - uses: actions/upload-artifact@v4
        if: ${{ !cancelled() }}
        with:
          name: playwright-report
          path: playwright-report/
          retention-days: 30

  # STAGE 2: Build the Docker Image
  build-image:
    needs: test # This ensures Docker ONLY builds if your Playwright tests pass
    runs-on: ubuntu-latest
    steps:
      - name: Checkout Repository
        uses: actions/checkout@v4

      # Installs Docker's modern build toolkit on the GitHub runner
      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v3

      # Executes the build using your repository's Dockerfile
      - name: Build Docker Image
        uses: docker/build-push-action@v5
        with:
          context: .
          push: false # Set to false to verify the build works without needing a registry account
          tags: my-next-app:latest
          cache-from: type=gha
          cache-to: type=gha,mode=max